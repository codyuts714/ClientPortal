/* ═══════════ QUOTE BUILDER (embedded) ═══════════ */
/* The builder keeps its own CSS and its own globals. Rather than merge two
   stylesheets and two render loops, it runs in a same-origin srcdoc frame and
   the portal reaches in: Firestore reads and writes go through the session
   that's already signed in here, and its Send-to-inbound button lands a lead
   on the board. Same file, same data, no collisions. */
let qbFrame=null, qbReady=false, qbState=null;

function quoteView(){
  return `<div class="hero"><div><h1>Quote Builder<span>.</span></h1>
    <div class="sub">Build it, save it, send it straight to the inbound board</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn outline" data-qbreload="1">RELOAD MENU</button>
    </div></div>
  <section class="panel" style="padding:0;overflow:hidden"><div id="qbMount"></div></section>`;
}

function mountQB(){
  const mount=document.getElementById("qbMount");
  if(!mount) return;
  qbFrame=document.createElement("iframe");
  qbFrame.id="qbFrame";
  qbFrame.setAttribute("title","Quote Builder");
  qbFrame.style.cssText="width:100%;border:0;display:block;min-height:900px;background:transparent";
  const src=document.getElementById("qbSrc").textContent
    .replace(/<\\\/script>/g,"<\/script>")
    .replace(/<\\script/g,"<"+"script")
    .replace(/<\\!--/g,"<"+"!--");
  mount.appendChild(qbFrame);
  /* written in rather than srcdoc: same-origin either way, but this fires
     synchronously so we can wire the bridge without racing the load event */
  const fd=qbFrame.contentDocument;
  fd.open(); fd.write(src); fd.close();
  setTimeout(()=>wireQB(),0);
  return;
  mount.appendChild(qbFrame);
}

function wireQB(tries){
  tries=tries||0;
  const w=qbFrame&&qbFrame.contentWindow;
  if(!w||!w.S||typeof w.render!=="function"){
    if(tries<60) return setTimeout(()=>wireQB(tries+1),50);
    return console.warn("quote builder didn't boot");
  }
  qbReady=true;
  w.UTS_LOGO=LOGO;
  const mark=w.document.getElementById("logoMark"); if(mark) mark.src=LOGO;

  /* the seam the builder already ships with */
  w.UTS_PUSH_LEAD = payload => leadFromQuote(payload);

  /* its cloud buttons, rerouted through the portal's authenticated session */
  w.loadCloud = async () => {
    try{
      const pub=await getDoc(doc(db,"quoteBuilder","public"));
      if(pub.exists()){ const d=pub.data();
        if(d.catalog)  w.S.catalog=d.catalog;
        if(d.packages) w.S.packages=d.packages;
        if(d.terms)    w.S.terms=d.terms; }
      const priv=await getDoc(doc(db,"quoteBuilder","private"));
      if(priv.exists()){ const costs=priv.data().costs||{};
        w.S.catalog.forEach(x=>{ if(costs[x.id]!=null) x.cost=costs[x.id]; });
        w.S.packages.forEach(p=>(p.lines||[]).forEach(l=>{ if(l.src&&costs[l.src]!=null) l.cost=costs[l.src]; })); }
      w.fill(); w.render(); sizeQB();
    }catch(e){ console.warn("qb load",e); w.toast&&w.toast("Couldn't load the menu"); }
  };
  w.saveCloud = async () => {
    const strip=a=>a.map(({cost,...r})=>r);
    const costs={}; w.S.catalog.forEach(x=>costs[x.id]=x.cost||0);
    try{
      await setDoc(doc(db,"quoteBuilder","public"),{
        catalog:strip(w.S.catalog),
        packages:w.S.packages.map(p=>({...p,lines:strip(p.lines||[])})),
        terms:w.S.terms, updatedAt:new Date().toISOString()});
      await setDoc(doc(db,"quoteBuilder","private"),{costs,updatedAt:new Date().toISOString()});
      w.toast&&w.toast("Saved — the public quote page reads this too");
    }catch(e){ console.warn("qb save",e); w.toast&&w.toast("Save failed — check the rules"); }
  };
  w.toggleAuth = () => w.toast&&w.toast("You're already signed in through the portal");

  /* only pull from the cloud on first mount — if we're restoring a state
     snapshot from before the tab was left, that snapshot IS the unsaved
     work, and re-fetching here would silently wipe it out again */
  const hadLocalState=!!qbState;
  if(qbState){ try{ Object.assign(w.S,qbState); }catch(e){} }
  if(!hadLocalState) w.loadCloud();
  else { w.fill&&w.fill(); w.render(); sizeQB(); }
  clearInterval(wireQB._t);
  wireQB._t=setInterval(()=>{ if(qbFrame&&qbFrame.isConnected) captureQB(); },1500);
  sizeQB(); setTimeout(sizeQB,400);
  try{ new w.ResizeObserver(sizeQB).observe(w.document.body); }catch(e){ setInterval(sizeQB,1200); }
}
function captureQB(){
  const w=qbFrame&&qbFrame.contentWindow;
  if(!w||!w.S) return;
  try{ qbState=JSON.parse(JSON.stringify(w.S)); }catch(e){}
}
let qbLastH=0,qbSizeRAF=null;
function sizeQB(){
  if(qbSizeRAF) return;
  qbSizeRAF=requestAnimationFrame(()=>{
    qbSizeRAF=null;
    const w=qbFrame&&qbFrame.isConnected&&qbFrame.contentWindow;
    if(!w||!w.document||!w.document.body) return;
    const h=Math.max(900,w.document.body.scrollHeight+40);
    /* ignore small fluctuations (a few px of sub-pixel/scrollbar jitter) —
       only resize on a real content change, or the page scrollbar visibly
       jumps every time the iframe redraws */
    if(Math.abs(h-qbLastH)<12) return;
    qbLastH=h;
    qbFrame.style.height=h+"px";
  });
}

/* a finished quote becomes a lead sitting at Proposal Out */
async function leadFromQuote(q){
  const now=new Date().toISOString();
  const lead={
    pipeline:"lead", leadStage:q.leadStage||"proposal",
    clientId:null, editor:null,
    name:q.name||"Unnamed lead",
    ask:q.project||q.package||"Package quote",
    channel:q.source==="client-built-quote"?"Form":"Quote",
    budget:money(q.value||0),
    contact:[q.email,q.phone].filter(Boolean).join(" · ")||"",
    createdAt:now,
    firstReplyAt:q.source==="client-built-quote"?null:now,
    nextFollowUp:q.followUpBy||null,
    quote:{number:q.quoteNumber||"",value:q.value||0,deposit:q.deposit||0,
      scope:q.scope||"",package:q.package||"",usage:q.usage||"",
      expires:q.expires||"",link:q.quoteLink||"",quotedAt:q.quotedAt||now},
    quoteLines:(q.deliverables||[]).map(d=>({name:d.name,qty:d.qty||1,optional:!!d.optional})),
    touches:[{at:now,type:q.source==="client-built-quote"?"Package request received":"Quote sent",
      note:`${q.package||"Custom build"} · ${money(q.value||0)}${q.usage?" · "+q.usage:""}`,sys:true}]
  };
  await addDoc(collection(db,"projects"),lead);
  toast("On the inbound board at Proposal Out");
}

/* ═══════════ SOCIAL CALENDAR ═══════════ */
let calMonth=todayISO().slice(0,7), calType="Reel";
const monthLabel=m=>{const d=new Date(m+"-01T00:00:00");
  return d.toLocaleString(undefined,{month:"long",year:"numeric"});};
const shiftMonth=(m,n)=>{const d=new Date(m+"-01T00:00:00"); d.setMonth(d.getMonth()+n);
  return d.toISOString().slice(0,7);};
const postsOf=p=>(p.posts||[]).slice().sort((a,b)=>a.d<b.d?-1:1);

function socialPanel(p){
  if(!p.social) return "";
  const posts=postsOf(p), types=typesFor(p);
  const first=new Date(calMonth+"-01T00:00:00");
  const pad=first.getDay(), days=new Date(first.getFullYear(),first.getMonth()+1,0).getDate();
  const cells=[];
  for(let i=0;i<pad;i++) cells.push(`<div class="cal-cell empty"></div>`);
  for(let d=1;d<=days;d++){
    const iso=`${calMonth}-${String(d).padStart(2,"0")}`;
    const mine=posts.filter(x=>x.d===iso);
    const isToday=iso===todayISO();
    cells.push(`<div class="cal-cell${isToday?" today":""}" data-calday="${esc(p.id)}:${iso}">
      <span class="cal-n">${d}</span>
      ${mine.map((x,i)=>`<span class="cal-post${x.posted?" done":""}"
        data-calchip="${esc(p.id)}:${iso}:${i}" title="${x.posted?"Posted":"Scheduled"} — click to toggle">
        ${esc(x.type)}${x.posted?" ✓":""}</span>`).join("")}
    </div>`);
  }
  const upcoming=posts.filter(x=>!x.posted&&x.d>=todayISO()).slice(0,3);
  return `<div class="socialbox">
    <div class="eyebrow">Social Calendar
      <span class="spacer"></span>
      <select class="sel" data-caltype="1" style="max-width:130px">
        ${types.map(t=>`<option ${calType===t?"selected":""}>${esc(t)}</option>`).join("")}</select>
      <button class="btn ghost mini" data-addtype="${esc(p.id)}">+ TYPE</button>
    </div>
    <div class="cal-head">
      <button class="btn ghost mini" data-calnav="-1">‹</button>
      <span class="cal-title">${esc(monthLabel(calMonth))}</span>
      <button class="btn ghost mini" data-calnav="1">›</button>
      <span class="spacer"></span>
      <span class="cal-hint">click a day to drop a ${esc(calType.toLowerCase())} · click a post to mark posted</span>
    </div>
    <div class="cal-dow">${["S","M","T","W","T","F","S"].map(x=>`<div>${x}</div>`).join("")}</div>
    <div class="cal-grid">${cells.join("")}</div>
    <div class="cal-foot">${posts.length} post${posts.length===1?"":"s"} scheduled ·
      ${posts.filter(x=>x.posted).length} posted${upcoming.length?` · next: ${esc(upcoming[0].type)} on ${esc(isoShort(upcoming[0].d))}`:""}</div>
  </div>`;
}

async function addPost(pid,iso){
  const p=byId(projects,pid); if(!p) return;
  const posts=[...(p.posts||[]),{d:iso,type:calType,posted:false}];
  await guard(()=>updateDoc(doc(db,"projects",pid),{posts}),`${calType} on ${isoShort(iso)}`);
}
async function togglePost(pid,iso,i){
  const p=byId(projects,pid); if(!p) return;
  const all=[...(p.posts||[])];
  const idxs=all.map((x,ix)=>[x,ix]).filter(([x])=>x.d===iso).map(([,ix])=>ix);
  const target=idxs[i]; if(target===undefined) return;
  all[target]={...all[target],posted:!all[target].posted,
    postedOn:!all[target].posted?todayISO():null};
  await guard(()=>updateDoc(doc(db,"projects",pid),{posts:all}),
    all[target].posted?"Marked posted":"Back to scheduled");
}
async function removePost(pid,iso,i){
  const p=byId(projects,pid); if(!p) return;
  const all=[...(p.posts||[])];
  const idxs=all.map((x,ix)=>[x,ix]).filter(([x])=>x.d===iso).map(([,ix])=>ix);
  const target=idxs[i]; if(target===undefined) return;
  all.splice(target,1);
  await guard(()=>updateDoc(doc(db,"projects",pid),{posts:all}),"Post removed");
}
function addTypeForm(pid){

}
async function saveType(pid){
  const p=byId(projects,pid); const n=fv("nt-name").trim();
  if(!p||!n) return toast("Give it a name");

async function setSocial(pid,on){

    on?"Socials on — calendar added":"Socials off");
}

/* posts we owe today or tomorrow, for the alert strip and notifications */
function postDigest(){
  const t=todayISO(), tm=addDays(t,1), out=[];
  projects.filter(p=>p.social).forEach(p=>{
    (p.posts||[]).forEach((x,i)=>{
      if(x.posted) return;
      if(x.d===t)  out.push({p,post:x,when:"TODAY",kind:"post-today"});
      else if(x.d===tm) out.push({p,post:x,when:"TOMORROW",kind:"post-tomorrow"});
      else if(x.d<t) out.push({p,post:x,when:`${Math.abs(dayDiff(x.d))}D LATE`,kind:"post-late"});
    });
  });
  return out;
}

document.addEventListener("click",e=>{
  const t=e.target.closest("[data-calnav],[data-calday],[data-calchip],[data-addtype],[data-savetype],[data-social],[data-backto]");

/* ═══════════ TIMING, COMPACT BOARD, DETAIL ═══════════ */
const dayDiff=iso=>{ if(!iso) return null;
  const a=new Date(iso+"T00:00:00"), b=new Date(); b.setHours(0,0,0,0);
  return Math.round((a-b)/864e5); };
const addDays=(iso,n)=>{ if(!iso) return null;
  const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };

/* first draft counts as in once every deliverable has left the edit bay */
function draftIn(p){
  const l=p.pieces||[];
  if(l.length) return l.every(x=>x.status!=="queued"&&x.status!=="editing");
  return (+p.stage||0)>=3;
}
const draftDue=p=>p.draftDueISO||(p.editStart?addDays(p.editStart,DRAFT_SLA):null);

/* {k, label} — k drives the colour: ok | soon | late */
function deliveryState(p){
  if(pct(p)===100||(+p.stage||0)===4) return {k:"ok",label:"DELIVERED"};
  const d=dayDiff(p.dueISO);
  if(d===null) return {k:"ok",label:"NO DUE DATE"};
  if(d<0)  return {k:"late",label:`${-d}D OVERDUE`};
  if(d===0)return {k:"late",label:"DUE TODAY"};
  if(d===1)return {k:"soon",label:"DUE TOMORROW"};
  return {k:d<=NEAR?"soon":"ok",label:`DUE IN ${d}D`};
}
function draftState(p){
  if((+p.stage||0)<2||pct(p)===100) return null;
  if(draftIn(p)) return {k:"ok",label:"DRAFT IN"};
  const dd=draftDue(p);
  if(!dd) return {k:"soon",label:"NO EDIT START"};
  const d=dayDiff(dd);
  if(d<0)  return {k:"late",label:`DRAFT ${-d}D LATE`};
  if(d===0)return {k:"late",label:"DRAFT DUE TODAY"};
  if(d===1)return {k:"soon",label:"DRAFT DUE TOMORROW"};
  return {k:"ok",label:`DRAFT IN ${d}D`};
}
const worstK=(...ks)=>ks.includes("late")?"late":ks.includes("soon")?"soon":"ok";
function projState(p){
  const d=deliveryState(p), dr=draftState(p);
  if(needsRev(p)) return "late";
  return worstK(d.k, dr?dr.k:"ok");
}
const K_COLOR={ok:T.muted,soon:T.gold,late:T.red};

function miniCard(p){
  const k=projState(p), d=deliveryState(p), dr=draftState(p);
  const l=p.pieces||[], done=l.filter(x=>x.status==="done").length;
  const tag=(txt,kk)=>`<span class="m-tag" style="color:${K_COLOR[kk]||"var(--dim)"};border-color:${kk&&kk!=="ok"?K_COLOR[kk]+"55":"var(--line)"};background:${kk&&kk!=="ok"?K_COLOR[kk]+"12":"transparent"}">${txt}</span>`;
  return `<button class="pmini st-${k}" data-open="${esc(p.id)}">
    <span class="m-pct">${pct(p)}<span>%</span></span>
    <div class="m-id">${esc(p.code||p.type||"—")}${p.code&&p.type?" · "+esc(p.type):""}</div>
    <div class="m-title">${esc(p.title||"Untitled")}</div>
    <div class="m-client">${esc(clientName(p.clientId))}</div>
    <div class="m-bar"><i style="width:${pct(p)}%"></i></div>
    <div class="m-tags">
      ${tag(STAGES[+p.stage||0].toUpperCase())}
      ${tag(d.label,d.k)}
      ${dr?tag(dr.label,dr.k):""}
      ${l.length>1?tag(`${done}/${l.length} DONE`):""}
      ${needsRev(p)?tag("REVISIONS","late"):""}
      ${p.editor?tag(esc(p.editor)):""}
    </div></button>`;
}

/* ── the board ── */
function projectBoard(){
  const live=projects.filter(p=>pct(p)<100);
  const pool=projFilter==="done"?projects.filter(p=>pct(p)===100)
            :projFilter==="late"?live.filter(p=>projState(p)==="late")
            :projFilter==="attention"?live.filter(p=>projState(p)!=="ok")
            :live;
  const list=(projClient==="all"?pool:pool.filter(p=>p.clientId===projClient))
    .sort((a,b)=>{ const r={late:0,soon:1,ok:2};
      const d=r[projState(a)]-r[projState(b)]; if(d) return d;
      return (dayDiff(a.dueISO)??999)-(dayDiff(b.dueISO)??999); });
  const f=(k,lbl,n)=>`<button class="${projFilter===k?"on":""}" data-pfilter="${k}">${lbl}${n!==undefined?` ${n}`:""}</button>`;
  return `<section class="panel"><div class="eyebrow">Projects
    <span class="spacer"></span>
    <button class="btn gold mini" data-form="project">+ NEW PROJECT</button></div>
    <div class="filterbar">
      ${f("all","All",live.length)}
      ${f("attention","Needs attention",live.filter(p=>projState(p)!=="ok").length)}
      ${f("late","Late",live.filter(p=>projState(p)==="late").length)}
      ${f("done","Delivered",projects.filter(p=>pct(p)===100).length)}
      <span class="spacer"></span>
      <select class="sel" id="pClientFilter" style="max-width:180px">
        <option value="all" ${projClient==="all"?"selected":""}>All clients</option>
        ${clients.map(c=>`<option value="${esc(c.id)}" ${projClient===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}
      </select>
    </div>
    ${list.length?`<div class="proj-grid">${list.map(miniCard).join("")}</div>`
      :`<div style="font-size:13px;color:var(--dim)">Nothing in this filter.</div>`}
  </section>`;
}

/* ── alerts ── */
function digest(){
  const live=projects.filter(p=>pct(p)<100);
  const out=[];
  live.forEach(p=>{
    const d=deliveryState(p), dr=draftState(p);
    if(d.k==="late")  out.push({p,kind:"delivery",label:d.label});
    else if(d.k==="soon") out.push({p,kind:"delivery-soon",label:d.label});
    if(dr&&dr.k==="late") out.push({p,kind:"draft",label:dr.label});
    if(needsRev(p)) out.push({p,kind:"revision",label:"CLIENT REVISIONS"});
  });
  postDigest().forEach(x=>out.push({p:x.p,kind:x.kind,
    label:`${x.post.type.toUpperCase()} POST ${x.when}`}));
  return out.sort((a,b)=>(a.label.includes("OVERDUE")||a.label.includes("LATE")?0:1)
                        -(b.label.includes("OVERDUE")||b.label.includes("LATE")?0:1));
}

async function askAlerts(){

const seenKey=(id,kind)=>`uts-alert:${id}:${kind}:${todayISO()}`;
function fireAlerts(){

const leadMins=iso=>Math.max(0,Math.round((Date.now()-new Date(iso).getTime())/6e4));
const leadFmt=m=>m<60?m+"m":m<1440?Math.floor(m/60)+"h":Math.floor(m/1440)+"d";
const leadStamp=iso=>new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
const lastTouch=l=>(l.touches||[]).slice().sort((a,b)=>new Date(b.at)-new Date(a.at))[0]||null;
const leadOverdue=l=>l.nextFollowUp&&l.nextFollowUp<todayISO();

function leadClock(l){
  if(!l.firstReplyAt){
    const m=leadMins(l.createdAt);
    return {k:m<SLA_MIN?"ok":m<SLA_MIN*3?"warn":"bad",t:"NO REPLY · "+leadFmt(m),c:m<SLA_MIN?T.green:m<SLA_MIN*3?T.gold:T.red};
  }
  const tch=lastTouch(l);
  if(!tch) return {k:"ok",t:"REPLIED",c:T.green};
  const d=leadMins(tch.at)/1440;
  return {k:d<STALE_DAYS?"ok":d<STALE_DAYS*2?"warn":"bad",
          t:tch.type.toUpperCase()+" "+leadFmt(leadMins(tch.at))+" AGO",
          c:d<STALE_DAYS?T.green:d<STALE_DAYS*2?T.gold:T.red};
}
function leadTemplates(l){
  const who=(l.name||"there").replace(/^@/,"").split(" ")[0];
  return [
    ["Real prospect",`Hey ${who} — Cody with Under The Sun Studios. Thanks for reaching out about ${l.ask||"the project"}.

Two quick questions so I can get you a real number: when do you need it live, and is this a one-off or something running monthly?

Happy to jump on a 10 minute call today if that's easier.`],
    ["Price shopper",`Hey ${who} — Cody at Under The Sun Studios. Appreciate you reaching out.

Projects like this usually land between $2-6k depending on shoot days and how many cuts you need. If that's the right neighborhood, send me your deadline and I'll put an exact quote together.`],
    ["Referral",`Hey ${who} — Cody with Under The Sun Studios. Glad the referral sent you my way.

Tell me what you're picturing for ${l.ask||"this"} and roughly when you need it, and I'll come back with a plan and pricing today.`]
  ];
}

  const pieces=(names.length?names:["Main Cut"]).map(n=>({name:n,status:"queued"}));
  const due=fv("cv-due")||todayISO();
  await guard(()=>updateDoc(doc(db,"projects",id),{
    pipeline:null, leadStage:null,
    clientId:cid, title:fv("cv-title").trim()||l.ask||"New project",
    code:fv("cv-code").trim(), type:fv("cv-type").trim(),
    stage:0, cost, dueISO:due, due:isoShort(due),
    editor:fv("cv-editor").trim()||null, editCost:+fv("cv-ecost")||0,
    editStart:null, pieces, approvals:{},
    depositPaid:false, finalPaid:false, depositPaidOn:null, finalPaidOn:null,
    convertedAt:new Date().toISOString(), nextFollowUp:null,
    touches:[...(l.touches||[]),{at:new Date().toISOString(),type:"Won — converted to project",note:"",sys:true}]
  }),"Converted — it's on the Studio board");
  logActivity(cid,`New project started — ${fv("cv-title").trim()||l.ask||"project"}`);
  closeModal(); view="owner"; paint();
}

document.addEventListener("click",e=>{

  if(chip){ const g=chip.closest("[data-chipgroup]");
    [...g.children].forEach(b=>b.classList.toggle("on",b===chip)); return; }
  const t=e.target.closest("[data-lead-new],[data-lead-stage],[data-lead-touch],[data-lead-tmpl],[data-lead-hist],[data-lead-edit],[data-lead-won],[data-lead-lost],[data-lead-save],[data-lead-savetouch],[data-lead-convert],[data-lead-copy],[data-lead-del]");
  if(!t) return;
  const d=t.dataset;
  if(d.leadNew!==undefined) return leadForm(null);
  if(d.leadStage){ const [id,st]=d.leadStage.split(":"); return setLeadStage(id,st); }
  if(d.leadTouch)  return touchForm(d.leadTouch);
  if(d.leadTmpl)   return leadTemplateForm(d.leadTmpl);
  if(d.leadHist)   return leadHistory(d.leadHist);
  if(d.leadEdit)   return leadForm(d.leadEdit);
  if(d.leadWon)    return convertForm(d.leadWon);
  if(d.leadLost)   return setLeadStage(d.leadLost,"lost");
  if(d.leadSave!==undefined) return saveLead(d.leadSave||null);
  if(d.leadSavetouch) return saveTouch(d.leadSavetouch);
  if(d.leadConvert)   return convertLead(d.leadConvert);
  if(d.leadCopy!==undefined){
    const txt=(window.__leadTpl||[])[+d.leadCopy]||"";
    navigator.clipboard?.writeText(txt);
    t.textContent="COPIED"; setTimeout(()=>t.textContent="COPY",1400); return;
  }
  if(d.leadDel){ if(confirm("Delete this lead for good?"))
    guard(()=>deleteDoc(doc(db,"projects",d.leadDel)),"Lead deleted").then(closeModal); return; }
});

function ownerView(){
  const open=projects.filter(p=>pct(p)<100);

  const lastMonth=(()=>{const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);})();
  const sumMonth=m=>invoices.filter(i=>(i.dateISO||"").startsWith(m)).reduce((s,i)=>s+(+i.amount||0),0);
  const outstInv=invoices.filter(i=>i.status!=="Paid").reduce((s,i)=>s+(+i.amount||0),0);
  const apOwed=payables.filter(p=>p.status==="owed").reduce((s,p)=>s+(+p.amount||0),0);
  const onDel=open.reduce((s,p)=>s+editTotal(p),0);
  const risk=projects.filter(p=>p.editStart&&p.stage>=2&&pct(p)<100&&daysIn(p.editStart)>=5).length;
  const projDue=projects.reduce((s,p)=>s+projOutstanding(p),0);
  const outst=outstInv+projDue;
  const pays=payments();
  const recentPays=pays.slice(0,10);
  const revs=projects.filter(needsRev);

  if(!clients.length){
    return `<div class="hero"><div><h1>Studio<span>.</span></h1>

  const day0=new Date(); day0.setHours(0,0,0,0);
  const dleft=p=>p.dueISO?Math.round((new Date(p.dueISO+"T00:00:00")-day0)/864e5):999;
  const radarRow=p=>{
    const d=dleft(p), c=d<0?T.red:d<=3?T.gold:T.muted;
    const lbl=d<0?`${-d}d OVERDUE`:d===0?"TODAY":d===1?"TOMORROW":d>900?"NO DATE":`IN ${d} DAYS`;
    return `<div class="list-row">
      <div><div class="inv-label">${esc(p.title)}</div>

        <span style="font-size:14px;font-weight:800">${esc(ed)}</span>

      ${upcoming.map(p=>row(p.title,
        `${pct(p)}% · due ${p.due||""}${hasPieceCosts(p)?` · ${piecesFor(p,ed).length} of ${(p.pieces||[]).length} deliverables`:""}`,

      ${paidRows.map(p=>row(p.ref||"—",`paid ${p.paidOn||""}`,p.amount,`<span class="tag paid">PAID</span>`,p.id)).join("")}
    </div>`;}).join("");

    ${stat("COLLECTED LAST MONTH",money(collectedMonth(lastMonth)),T.dim)}
    ${stat("BILLED THIS MONTH",money(sumMonth(thisMonth)),T.gold)}
    ${stat("OUTSTANDING (A/R)",money(outst),outst?T.gold:T.green)}
    ${stat("ACCOUNTS PAYABLE",money(apOwed),apOwed?T.red:T.green)}
    ${stat("SLA WATCH (DAY 5+)",risk,risk?T.red:T.green)}
  </div>
  ${alertStrip()}
  ${projectBoard()}
  <div class="two-col">
    <section class="panel"><div class="eyebrow">Delivery Radar</div>${radar}</section>
    <section class="panel"><div class="eyebrow">Editor Payments
      <span class="spacer"></span><button class="btn outline mini" data-form="payable">+ LOG PAYMENT</button></div>

        <span style="font-family:var(--mono);font-size:11px;color:var(--gold-soft);letter-spacing:.1em">OWED NOW + ON DELIVERY</span>
        <span class="amount" style="color:var(--gold);font-weight:600">${money(apOwed+onDel)}</span></div>

  <section class="panel"><div class="eyebrow">Payments In — ${money(collectedMonth(thisMonth))} this month</div>

        <div class="inv-meta">${esc(clientName(x.clientId))} &middot; ${esc(isoShort(x.when)||x.when||"")} &middot; ${x.kind==="project"?"project payment":"invoice"}</div></div>

  <section class="panel"><div class="eyebrow">Client Database

      const iv=invoicesOf(c.id);
      const cDue=iv.filter(i=>i.status!=="Paid").reduce((s,i)=>s+(+i.amount||0),0);
      return `<div class="db-row">
        <div><div class="db-name">${esc(c.name)}</div>

          ${iv.length?`<div style="margin-top:6px;display:flex;flex-direction:column;gap:2px">${iv.map(i=>
            `<button class="linkbtn" data-form="invoice" data-id="${esc(i.id)}" style="text-align:left;font-family:var(--mono);font-size:10.5px;color:${i.status==="Paid"?"var(--dim)":"var(--gold-soft)"}">
              ${esc(i.label)} — ${money(i.amount)} · ${esc(i.status)}</button>`).join("")}</div>`:""}</div>
        <div class="db-actions">

      <span class="inv-meta">${esc(settings.studio||"not set")}</span></div>

    <div class="inv-meta" style="padding-top:10px">Editor posts a cut &rarr; texts you. You post a cut &rarr; texts that client.
      Client approves or asks for revisions &rarr; texts you. New assignment &rarr; texts the editor.</div>
  </section>

  <section class="panel"><div class="eyebrow">Access — Who Can Log In
    <span class="spacer"></span><button class="btn outline mini" data-form="access">+ GIVE ACCESS</button></div>

function paint(){
  if(qbFrame&&qbFrame.isConnected) captureQB();
  const root=document.getElementById("root");
  if(booting){ root.innerHTML=`<div class="boot"><div class="spin"></div><div>Loading</div></div>`; return; }
  if(!me){ root.innerHTML=gate(); return; }

  const isOwner=me.role==="owner";
  const label=isOwner?"Owner":me.role==="editor"?"Editor":"Client";
  const tabs=isOwner?`
    <button class="tab ${view==="owner"?"on":""}" data-view="owner">Studio</button>
    <button class="tab ${view==="quote"?"on":""}" data-view="quote">Quote Builder</button>
    <button class="tab ${view==="inbound"?"on":""}" data-view="inbound">Inbound${leads.filter(l=>!l.firstReplyAt).length?` <span style="color:var(--gold)">&bull;</span>`:""}</button>
    <button class="tab ${view==="editor"?"on":""}" data-view="editor">Editor</button>
    <button class="tab ${view==="client"?"on":""}" data-view="client">Client</button>`:"";
  const pickers=isOwner&&view==="client"&&clients.length
    ? `<select id="cSel">${clients.map(c=>`<option value="${esc(c.id)}" ${previewClient===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}</select>`
    : isOwner&&view==="editor"&&editorNames().length
    ? `<select id="eSel">${editorNames().map(e=>`<option ${previewEditor===e?"selected":""}>${esc(e)}</option>`).join("")}</select>` : "";

  let body;
  if(me.role==="client")      body=clientView(me.clientId);
  else if(me.role==="editor") body=editorView(me.editorName);
  else if(view==="client")    body=clientView(previewClient||clients[0]?.id);
  else if(view==="quote")     body=quoteView();
  else if(view==="inbound")   body=inboundView();
  else if(view==="editor")    body=editorView(previewEditor||editorNames()[0]);
  else                        body=ownerView();

  root.innerHTML=`
    <header>
      <div class="brand"><img src="${LOGO}" width="32" height="32" alt="Under The Sun Studios">
        <div><div class="brand-name">Under The Sun</div><div class="brand-tag">Bringing Ideas To Light</div></div></div>
      <div class="controls">${pickers}${tabs}
        <div class="whoami">${DEMO?`<span class="role" style="color:var(--red);border-color:rgba(240,85,107,.35);background:rgba(240,85,107,.1)">DEMO</span>`:""}<span class="role">${label}</span>
          <button class="linkbtn" data-logout="1">Sign out</button></div>
      </div>
    </header>
    <main class="${view==="quote"?"wide":""}">${body}</main>
    <footer>Under The Sun Studios · Long Beach, CA</footer>`;
  if(view==="quote"&&me.role==="owner") mountQB();
  if(openProject) renderDetail();
  fireAlerts();
}

  if(d.savePay){ const [id,w]=d.savePay.split(":"); return savePayDate(id,w); }
  if(d.clearPay){ const [id,w]=d.clearPay.split(":"); return clearPay(id,w); }
  if(d.link){ const [id,k]=d.link.split(":"); return linkForm(id,k); }
  if(d.plink){ const [id,i]=d.plink.split(":"); return pieceLinkForm(id,+i); }

  if(d.form==="client")  return clientForm(d.id||null);
  if(d.form==="project") return projectForm(d.id||null,d.client||null);

  if(d.form==="payable") return payableForm(d.id||null);

  if(d.saveProject!==undefined) return saveProject(d.saveProject||null);
  if(d.saveInvoice!==undefined) return saveInvoice(d.saveInvoice||null);

  if(d.delClient)  return removeClient(d.delClient);
  if(d.delProject) return removeProject(d.delProject);
  if(d.delInvoice) return removeInvoice(d.delInvoice);
  if(d.delPayable) return removePayable(d.delPayable);
  if(d.delAccess)  return removeAccess(d.delAccess);
});

  if(ds.pdue)    setDue(ds.pdue,e.target.value);
  if(ds.peditor) setEditorOn(ds.peditor,e.target.value);
  if(ds.ptype)   guard(()=>updateDoc(doc(db,"projects",ds.ptype),{type:e.target.value}),e.target.value);
  if(e.target.id==="pf-price"){
    const v=+e.target.value||0, h=Math.round(v/2);
    const box=e.target.closest(".f-grid");
    const labs=box?box.querySelectorAll("#pf-dep,#pf-fin"):[];
    if(labs[0]) labs[0].parentNode.lastChild.textContent="Deposit paid ($"+h+")";
    if(labs[1]) labs[1].parentNode.lastChild.textContent="Final paid ($"+(v-h)+")";
  }
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeModal();
  if(e.key==="Enter"&&document.getElementById("g-pass")) doLogin();
});

/* ── boot ── */
onAuthStateChanged(auth,u=>{
  authUser=u;
  if(u){ booting=true; paint(); loadFor(u); }
  else { me=null; booting=false; stopAll();
         clients=[];projects=[];invoices=[];payables=[];activity=[];users=[]; paint(); }
});

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
})();
</script>
</body>
</html>
